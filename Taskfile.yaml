


version: '3'
tasks:
  docker_build:
    vars:
      COMMIT_HASH:
        sh: "git rev-parse --short HEAD"
      IMAGE_NAME: db_server
      HISTORY_FILE_NAME: docker_versions.yaml
      DATETIME: 
        sh: "date +\"%d.%m.%Y %H:%M\""
      VERSION: "{{.CLI_ARGS}}"
      IMAGE_TAG: "{{.IMAGE_NAME}}:{{.VERSION}}-{{.COMMIT_HASH}}"
    aliases:
      - db
    preconditions:
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Version not found, specify one: -- v1.2.3"
    cmds:
      - docker build -t {{.IMAGE_TAG}} .
      - |
        if [ ! -f {{.HISTORY_FILE_NAME}} ]; then
          echo "builds:" > {{.HISTORY_FILE_NAME}}
        fi
      - |
        cat >> {{.HISTORY_FILE_NAME}} <<EOF
        - {{.VERSION}}:
          name: {{.IMAGE_TAG}}
          datetime: {{.DATETIME}}
        EOF
      - echo "Image {{.IMAGE_TAG}} built successfully"
    desc: Build the Docker image with commit and version.
