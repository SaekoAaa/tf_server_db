services:
  server:
    image: db_server:2.1.3-c47fd8b
    container_name: db_server
    ports:
      - 8080:80
    environment:
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_DATABASE: todo
      DB_ADDRESS: mysql
      DB_ROOT_PWD: 123
      DB_PORT: 3306
      PORT: 80
      USE_METRICS: true
      COLLECTOR_URL: "http://otel-collector:4318/v1"
    mem_limit: 512m
    cpus: 1.0
  mysql:
    image: mysql:8.0
    container_name: mysql_simple_server
    ports:
      - 3306:3306
    environment:
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PWD}
      MYSQL_DATABASE: ${DB_DATABASE}
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
  otel-collector:
    container_name: otel
    image: otel/opentelemetry-collector-contrib
    command: --config=/etc/otelcol/config.yaml
    ports:
      - "4318:4318" # HTTP
    #      - "9464:9464"  # Prometheus scrape endpoint
    volumes:
      - ./config/otel_collector.yaml:/etc/otelcol/config.yaml:ro
  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
    # command: run /scripts/test.js -o opentelemetry
    entrypoint: ["k6"]
    environment:
      - K6_OTEL_EXPORTER_TYPE=http
      - K6_OTEL_HTTP_EXPORTER_ENDPOINT=otel-collector:4318
      - K6_OTEL_HTTP_EXPORTER_INSECURE=true
      - K6_OTEL_SERVICE_NAME=k6-load-test
      - K6_OTEL_EXPORT_INTERVAL=5s
    depends_on:
      - server
      - otel-collector
    profiles:
      - testing
  # jaeger:
  #   image: jaegertracing/jaeger:latest
  #   container_name: jaeger
  #   ports:
  #     - "16686:16686" # Web UI http://localhost:16686
  #     - "14268:14268"
  #   expose:
  #     - "14268"
  #     - "4317"
  #     - "4318"
  #   environment:
  #     COLLECTOR_OTLP_ENABLED: "true"
  #     LOG_LEVEL: debug
  prom:
    image: prom/prometheus
    ports:
      - "9099:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - gf_security_admin_user=admin
      - gf_security_admin_password=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prom
    restart: unless-stopped
volumes:
  grafana_data:
  k6_results:
